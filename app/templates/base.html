<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}二手房数据分析系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body>
    <nav class="navbar navbar-expand-lg app-navbar sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">二手房分析</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
          <ul class="navbar-nav ms-auto gap-lg-2">
            <li class="nav-item">
              <a class="nav-link {% if active == 'home' %}active{% endif %}" href="/">首页</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active == 'houses' %}active{% endif %}" href="/houses">房源列表</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active == 'analysis' %}active{% endif %}" href="/analysis">数据分析</a>
            </li>
            <li class="nav-item">
              <a class="btn btn-sm btn-primary-soft" href="/docs">API 文档</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
      <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
        <span>Second-Hand House Analysis System</span>
        <span>FastAPI + MySQL + ECharts</span>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
